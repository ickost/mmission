<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>미션보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF7;--card:#FFFFFF;--text:#1A1A18;--sub:#6B6B66;--hint:#A3A39E;
  --border:#E8E8E3;--accent:#1D9E75;--accent-bg:#E1F5EE;--accent-dark:#085041;
  --danger:#E24B4A;--danger-bg:#FCEBEB;
  --warm:#F5F0E8;--warm2:#EDE6DA;
  --radius:14px;--radius-sm:10px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;outline:none}

.container{max-width:480px;margin:0 auto;padding:0 20px 40px}

/* Entry Screen */
#entry-view{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 20px;text-align:center}
#entry-view .logo{width:72px;height:72px;border-radius:20px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
#entry-view .logo svg{width:36px;height:36px}
#entry-view h1{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
#entry-view .tagline{font-size:14px;color:var(--sub);margin-bottom:40px}
#entry-view .field{width:100%;max-width:320px;margin-bottom:16px}
#entry-view .field label{display:block;font-size:12px;font-weight:500;color:var(--sub);margin-bottom:6px;text-align:left}
#entry-view .field input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--card);transition:border-color .2s}
#entry-view .field input:focus{border-color:var(--accent)}
#entry-view .field input::placeholder{color:var(--hint)}
.btn-primary{width:100%;max-width:320px;padding:16px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:15px;font-weight:500;transition:transform .1s,opacity .2s}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:.4;cursor:default}
#entry-view .hint{font-size:12px;color:var(--hint);margin-top:16px;line-height:1.6}

/* Board View */
#board-view{display:none}
.board-header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 16px;position:sticky;top:0;background:var(--bg);z-index:10}
.board-header .room-info{font-size:12px;color:var(--hint);background:var(--warm);padding:4px 10px;border-radius:20px}
.month-nav{display:flex;align-items:center;gap:2px;margin-bottom:20px}
.month-nav button{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:background .15s}
.month-nav button:hover{background:var(--warm)}
.month-nav button svg{width:18px;height:18px}
.month-nav .label{flex:1;text-align:center}
.month-nav .label .year{font-size:12px;color:var(--hint)}
.month-nav .label .month{font-size:22px;font-weight:700;letter-spacing:-0.5px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-card{background:var(--warm);border-radius:var(--radius-sm);padding:14px 12px;text-align:center}
.stat-card .num{font-size:22px;font-weight:700;color:var(--text)}
.stat-card .lbl{font-size:11px;color:var(--sub);margin-top:2px}

.mission-list{display:flex;flex-direction:column;gap:12px;padding-bottom:20px}

.m-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;border:1.5px solid var(--border);transition:border-color .15s,transform .15s}
.m-card:hover{border-color:#ccc}
.m-card.past{opacity:.5}
.m-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.m-card .date-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.m-card .date-pill{font-size:12px;font-weight:500;padding:3px 10px;border-radius:8px;background:var(--warm);color:var(--sub)}
.m-card .dday{font-size:11px;color:var(--accent);font-weight:500}
.m-card .dday.over{color:var(--hint)}
.m-card .title{font-size:16px;font-weight:700;letter-spacing:-0.3px;margin-bottom:3px}
.m-card .owner{font-size:12px;color:var(--sub)}
.m-card .desc{font-size:13px;color:var(--sub);margin:8px 0 0;line-height:1.5;word-break:break-all;white-space:pre-wrap}
.m-card .desc a{color:var(--accent);text-decoration:underline}
.m-card .bottom{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.m-card .avatars{display:flex;align-items:center}
.m-card .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:2px solid var(--card);flex-shrink:0}
.m-card .av+.av{margin-left:-8px}
.m-card .p-count{font-size:12px;color:var(--sub);margin-left:8px}

.join-btn{font-size:13px;font-weight:500;padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);color:var(--sub);transition:all .2s}
.join-btn:hover{border-color:var(--accent);color:var(--accent)}
.join-btn.joined{background:var(--accent-bg);color:var(--accent-dark);border-color:var(--accent-bg)}

.m-card .actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.m-card .act-btn{font-size:11px;color:var(--hint);padding:4px 10px;border-radius:6px;transition:background .15s}
.m-card .act-btn:hover{background:var(--warm)}
.m-card .act-btn.del:hover{background:var(--danger-bg);color:var(--danger)}

.fab{position:fixed;bottom:28px;right:50%;transform:translateX(50%);padding:14px 28px;border-radius:28px;background:var(--accent);color:#fff;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(29,158,117,.35);transition:transform .15s;z-index:20;display:flex;align-items:center;gap:6px}
.fab:active{transform:translateX(50%) scale(0.96)}
.fab svg{width:18px;height:18px}

.empty-state{text-align:center;padding:60px 20px;color:var(--hint)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px;line-height:1.6}

/* Register View */
#register-view{display:none}
.form-header{display:flex;align-items:center;gap:12px;padding:20px 0 24px}
.form-header .back{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:background .15s}
.form-header .back:hover{background:var(--warm)}
.form-header h2{font-size:18px;font-weight:700;flex:1}
.form-header .month-tag{font-size:13px;color:var(--hint)}

.form-group{margin-bottom:24px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--sub);margin-bottom:8px}
.form-group label .req{color:var(--danger)}
.form-group label .opt{font-weight:400;color:var(--hint)}
.form-group input[type="text"],.form-group input[type="date"],.form-group textarea{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--card);transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:none;line-height:1.5}
.form-group .counter{font-size:11px;color:var(--hint);text-align:right;margin-top:4px}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--hint)}

.preview-section{border-top:1.5px solid var(--border);padding-top:20px;margin:28px 0 24px}
.preview-section .label{font-size:13px;font-weight:500;color:var(--sub);margin-bottom:10px}
.preview-section .m-card{transition:opacity .3s}
.preview-section .m-card.empty{opacity:.35}

/* Edit modal overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;justify-content:center;align-items:flex-end}
.overlay.show{display:flex}
.overlay .sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;padding:28px 20px 40px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.overlay .sheet h3{font-size:17px;font-weight:700;margin-bottom:20px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:100;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ENTRY -->
<div id="entry-view">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
  </div>
  <h1>미션보드</h1>
  <p class="tagline">우리 단톡방의 월간 운동 미션</p>
  <div class="field">
    <label>닉네임</label>
    <input type="text" id="inp-nick" placeholder="단톡방에서 쓰는 이름" maxlength="10" autocomplete="off">
  </div>
  <div class="field">
    <label>방 코드</label>
    <input type="text" id="inp-room" placeholder="단톡방 공용 코드" maxlength="20" autocomplete="off">
  </div>
  <button class="btn-primary" id="btn-enter" onclick="enterRoom()" disabled>입장하기</button>
  <p class="hint">방 코드가 없으면 새로운 방이 만들어져요.<br>같은 코드를 쓰는 사람끼리 미션을 공유합니다.</p>
</div>

<!-- BOARD -->
<div id="board-view" class="container">
  <div class="board-header">
    <span class="room-info" id="room-badge"></span>
    <button style="font-size:13px;color:var(--sub);padding:6px 12px;border-radius:8px;border:1px solid var(--border)" onclick="logout()">나가기</button>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="label">
      <div class="year" id="nav-year"></div>
      <div class="month" id="nav-month"></div>
    </div>
    <button onclick="changeMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></button>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="num" id="st-total">0</div><div class="lbl">등록 미션</div></div>
    <div class="stat-card"><div class="num" id="st-joins">0</div><div class="lbl">총 참여</div></div>
    <div class="stat-card"><div class="num" id="st-mine">0</div><div class="lbl">내 참여</div></div>
  </div>
  <div class="mission-list" id="mission-list"></div>
  <button class="fab" onclick="showRegister()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    미션 등록
  </button>
</div>

<!-- REGISTER -->
<div id="register-view" class="container">
  <div class="form-header">
    <button class="back" onclick="showBoard()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h2 id="form-title">미션 등록</h2>
    <span class="month-tag" id="form-month-tag"></span>
  </div>
  <div class="form-group">
    <label>미션 제목 <span class="req">*</span></label>
    <input type="text" id="reg-title" placeholder="예: 마라톤대회 10KM" maxlength="30" oninput="updateRegPreview()">
    <div class="counter"><span id="reg-tc">0</span>/30</div>
  </div>
  <div class="form-group">
    <label>미션 설명 <span class="opt">(선택)</span></label>
    <textarea id="reg-desc" placeholder="장소, 참가 링크, 준비물 등 자유롭게" maxlength="200" rows="3" oninput="updateRegPreview()"></textarea>
    <div class="counter"><span id="reg-dc">0</span>/200</div>
  </div>
  <div class="form-group">
    <label>이벤트 날짜 <span class="req">*</span></label>
    <input type="date" id="reg-date" onchange="updateRegPreview()">
  </div>
  <div class="preview-section">
    <div class="label">미리보기</div>
    <div class="m-card empty" id="reg-preview">
      <div class="date-row"><span class="date-pill" id="pv-date">날짜 미정</span><span class="dday" id="pv-dday"></span></div>
      <div class="title" id="pv-title">미션 제목을 입력하세요</div>
      <div class="owner" id="pv-owner"></div>
      <div class="desc" id="pv-desc" style="display:none"></div>
      <div class="bottom">
        <div class="avatars"><div class="av" style="background:var(--accent-bg);color:var(--accent-dark)" id="pv-av">나</div><span class="p-count">1명 참여</span></div>
        <span style="font-size:12px;padding:6px 14px;border-radius:20px;background:var(--accent-bg);color:var(--accent-dark);font-weight:500">미션오너</span>
      </div>
    </div>
  </div>
  <button class="btn-primary" id="btn-submit" onclick="submitMission()" disabled>미션 등록하기</button>
  <p style="font-size:12px;color:var(--hint);text-align:center;margin-top:10px">등록하면 자동으로 미션오너 + 참여자가 됩니다</p>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="edit-overlay">
  <div class="sheet">
    <h3>미션 수정</h3>
    <div class="form-group">
      <label>미션 제목 <span class="req">*</span></label>
      <input type="text" id="edit-title" maxlength="30">
    </div>
    <div class="form-group">
      <label>미션 설명 <span class="opt">(선택)</span></label>
      <textarea id="edit-desc" maxlength="200" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>이벤트 날짜 <span class="req">*</span></label>
      <input type="date" id="edit-date">
    </div>
    <input type="hidden" id="edit-id">
    <div style="display:flex;gap:10px;margin-top:8px">
      <button style="flex:1;padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;font-weight:500;color:var(--sub)" onclick="closeEdit()">취소</button>
      <button class="btn-primary" style="flex:2" onclick="saveEdit()">저장하기</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['일','월','화','수','목','금','토'];
const COLORS = [
  {bg:'#E1F5EE',fg:'#085041'},{bg:'#E6F1FB',fg:'#0C447C'},{bg:'#FAEEDA',fg:'#633806'},
  {bg:'#FBEAF0',fg:'#72243E'},{bg:'#EEEDFE',fg:'#3C3489'},{bg:'#FAECE7',fg:'#712B13'},
  {bg:'#EAF3DE',fg:'#27500A'},{bg:'#FCEBEB',fg:'#791F1F'}
];

let state = { nickname:'', room:'', year:2026, month:4, missions:[], editId:null };

// Restore session
const saved = sessionStorage.getItem('mb_session');
if (saved) {
  try { const s = JSON.parse(saved); state.nickname = s.nickname; state.room = s.room; } catch(e) {}
}

// Init
const now = new Date();
state.year = now.getFullYear();
state.month = now.getMonth() + 1;

if (state.nickname && state.room) showBoard();

// Entry validation
document.getElementById('inp-nick').addEventListener('input', validateEntry);
document.getElementById('inp-room').addEventListener('input', validateEntry);
['inp-nick','inp-room'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') enterRoom(); });
});

function validateEntry() {
  const nick = document.getElementById('inp-nick').value.trim();
  const room = document.getElementById('inp-room').value.trim();
  document.getElementById('btn-enter').disabled = !(nick && room);
}

async function enterRoom() {
  const nickname = document.getElementById('inp-nick').value.trim();
  const room = document.getElementById('inp-room').value.trim();
  if (!nickname || !room) return;
  try {
    const res = await fetch('/api/rooms/enter', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code: room, nickname })
    });
    const data = await res.json();
    if (!res.ok) return toast(data.error);
    state.nickname = nickname;
    state.room = room;
    sessionStorage.setItem('mb_session', JSON.stringify({ nickname, room }));
    showBoard();
  } catch(e) { toast('연결에 실패했어요.'); }
}

function logout() {
  sessionStorage.removeItem('mb_session');
  state.nickname = ''; state.room = '';
  document.getElementById('board-view').style.display = 'none';
  document.getElementById('entry-view').style.display = 'flex';
}

function showBoard() {
  document.getElementById('entry-view').style.display = 'none';
  document.getElementById('register-view').style.display = 'none';
  document.getElementById('board-view').style.display = 'block';
  document.getElementById('room-badge').textContent = state.room + ' · ' + state.nickname;
  renderMonth();
  loadMissions();
}

function changeMonth(dir) {
  state.month += dir;
  if (state.month > 12) { state.month = 1; state.year++; }
  if (state.month < 1) { state.month = 12; state.year--; }
  renderMonth();
  loadMissions();
}

function renderMonth() {
  document.getElementById('nav-year').textContent = state.year;
  document.getElementById('nav-month').textContent = state.month + '월 미션';
}

async function loadMissions() {
  try {
    const res = await fetch(`/api/rooms/${encodeURIComponent(state.room)}/missions?year=${state.year}&month=${state.month}`);
    const data = await res.json();
    state.missions = data.missions || [];
    renderMissions();
  } catch(e) { toast('미션을 불러올 수 없어요.'); }
}

function renderMissions() {
  const list = document.getElementById('mission-list');
  const today = new Date(); today.setHours(0,0,0,0);

  if (state.missions.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#9898;</div><p>아직 등록된 미션이 없어요.<br>첫 미션을 등록해보세요!</p></div>';
  } else {
    list.innerHTML = state.missions.map(m => {
      const d = new Date(m.event_date + 'T00:00:00');
      const diff = Math.round((d - today) / 86400000);
      const dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' (' + DAYS[d.getDay()] + ')';
      const dday = diff > 0 ? 'D-' + diff : diff === 0 ? 'D-Day' : '종료';
      const ddayClass = diff < 0 ? 'over' : '';
      const isPast = diff < 0;
      const isJoined = m.participants.includes(state.nickname);
      const isOwner = m.owner === state.nickname;
      const avatars = m.participants.map((p, i) => {
        const c = COLORS[hashCode(p) % COLORS.length];
        return `<div class="av" style="background:${c.bg};color:${c.fg}${i > 0 ? ';margin-left:-8px' : ''}">${p.charAt(0)}</div>`;
      }).join('');

      const descHtml = m.description ? `<div class="desc">${linkify(escHtml(m.description))}</div>` : '';
      const ownerActions = isOwner ? `<div class="actions"><button class="act-btn" onclick="openEdit('${m.id}')">수정</button><button class="act-btn del" onclick="deleteMission('${m.id}')">삭제</button></div>` : '';

      return `<div class="m-card${isPast ? ' past' : ''}">
        <div class="top"><div style="flex:1">
          <div class="date-row"><span class="date-pill">${dateStr}</span><span class="dday ${ddayClass}">${dday}</span></div>
          <div class="title">${escHtml(m.title)}</div>
          <div class="owner">미션오너: ${escHtml(m.owner)}</div>
          ${descHtml}
        </div></div>
        <div class="bottom">
          <div class="avatars">${avatars}<span class="p-count">${m.participants.length}명 참여</span></div>
          <button class="join-btn${isJoined ? ' joined' : ''}" onclick="toggleJoin('${m.id}',${isJoined})">${isJoined ? '참여중' : '함께하기'}</button>
        </div>
        ${ownerActions}
      </div>`;
    }).join('');
  }

  // Stats
  let totalJoins = 0, myJoins = 0;
  state.missions.forEach(m => {
    totalJoins += m.participants.length;
    if (m.participants.includes(state.nickname)) myJoins++;
  });
  document.getElementById('st-total').textContent = state.missions.length;
  document.getElementById('st-joins').textContent = totalJoins;
  document.getElementById('st-mine').textContent = myJoins;
}

async function toggleJoin(id, isJoined) {
  const endpoint = isJoined ? 'leave' : 'join';
  try {
    const res = await fetch(`/api/rooms/${encodeURIComponent(state.room)}/missions/${id}/${endpoint}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nickname: state.nickname })
    });
    const data = await res.json();
    if (!res.ok) return toast(data.error);
    loadMissions();
  } catch(e) { toast('처리에 실패했어요.'); }
}

// Register
function showRegister(editData) {
  document.getElementById('board-view').style.display = 'none';
  document.getElementById('register-view').style.display = 'block';
  document.getElementById('form-month-tag').textContent = state.month + '월';
  document.getElementById('pv-owner').textContent = '미션오너: ' + state.nickname;
  document.getElementById('pv-av').textContent = state.nickname.charAt(0);

  if (!editData) {
    document.getElementById('form-title').textContent = '미션 등록';
    document.getElementById('reg-title').value = '';
    document.getElementById('reg-desc').value = '';
    document.getElementById('reg-date').value = '';
    document.getElementById('btn-submit').textContent = '미션 등록하기';
    document.getElementById('btn-submit').onclick = submitMission;
  }
  updateRegPreview();
}

function updateRegPreview() {
  const title = document.getElementById('reg-title').value;
  const desc = document.getElementById('reg-desc').value;
  const dateVal = document.getElementById('reg-date').value;

  document.getElementById('reg-tc').textContent = title.length;
  document.getElementById('reg-dc').textContent = desc.length;
  document.getElementById('pv-title').textContent = title || '미션 제목을 입력하세요';

  const pvDesc = document.getElementById('pv-desc');
  if (desc) { pvDesc.textContent = desc; pvDesc.style.display = 'block'; }
  else { pvDesc.style.display = 'none'; }

  if (dateVal) {
    const d = new Date(dateVal + 'T00:00:00');
    document.getElementById('pv-date').textContent = (d.getMonth()+1) + '/' + d.getDate() + ' (' + DAYS[d.getDay()] + ')';
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    document.getElementById('pv-dday').textContent = diff > 0 ? 'D-' + diff : diff === 0 ? 'D-Day' : '종료';
  } else {
    document.getElementById('pv-date').textContent = '날짜 미정';
    document.getElementById('pv-dday').textContent = '';
  }

  const valid = title.trim() && dateVal;
  document.getElementById('reg-preview').classList.toggle('empty', !valid);
  document.getElementById('btn-submit').disabled = !valid;
}

async function submitMission() {
  const title = document.getElementById('reg-title').value.trim();
  const description = document.getElementById('reg-desc').value.trim();
  const event_date = document.getElementById('reg-date').value;
  if (!title || !event_date) return;

  try {
    const res = await fetch(`/api/rooms/${encodeURIComponent(state.room)}/missions`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title, description, event_date, owner: state.nickname })
    });
    const data = await res.json();
    if (!res.ok) return toast(data.error);

    // Set month to match the registered mission
    const d = new Date(event_date + 'T00:00:00');
    state.year = d.getFullYear();
    state.month = d.getMonth() + 1;

    toast('미션이 등록되었어요!');
    showBoard();
  } catch(e) { toast('등록에 실패했어요.'); }
}

// Edit
function openEdit(id) {
  const m = state.missions.find(x => x.id === id);
  if (!m) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-title').value = m.title;
  document.getElementById('edit-desc').value = m.description || '';
  document.getElementById('edit-date').value = m.event_date;
  document.getElementById('edit-overlay').classList.add('show');
}
function closeEdit() { document.getElementById('edit-overlay').classList.remove('show'); }

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const title = document.getElementById('edit-title').value.trim();
  const description = document.getElementById('edit-desc').value.trim();
  const event_date = document.getElementById('edit-date').value;
  if (!title || !event_date) return toast('제목과 날짜를 입력해주세요.');

  try {
    const res = await fetch(`/api/rooms/${encodeURIComponent(state.room)}/missions/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title, description, event_date, owner: state.nickname })
    });
    const data = await res.json();
    if (!res.ok) return toast(data.error);
    closeEdit();
    toast('수정되었어요!');
    loadMissions();
  } catch(e) { toast('수정에 실패했어요.'); }
}

async function deleteMission(id) {
  if (!confirm('이 미션을 삭제할까요?')) return;
  try {
    const res = await fetch(`/api/rooms/${encodeURIComponent(state.room)}/missions/${id}`, {
      method:'DELETE', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ owner: state.nickname })
    });
    const data = await res.json();
    if (!res.ok) return toast(data.error);
    toast('삭제되었어요.');
    loadMissions();
  } catch(e) { toast('삭제에 실패했어요.'); }
}

// Helpers
function escHtml(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
function linkify(text) { return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>'); }
function hashCode(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return Math.abs(h); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
